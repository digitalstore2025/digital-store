<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4169e1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#skyGradient)"/>

  <!-- Airplane (simplified) -->
  <g transform="translate(256, 256)">
    <!-- Main body -->
    <path d="M 0,-80 L 20,-60 L 20,60 L 0,80 L -20,60 L -20,-60 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="4"/>

    <!-- Wings -->
    <path d="M -100,-20 L 100,-20 L 80,0 L -80,0 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="4"/>

    <!-- Tail -->
    <path d="M -15,40 L 15,40 L 10,80 L -10,80 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="4"/>

    <!-- Vertical stabilizer -->
    <path d="M -5,60 L 5,60 L 8,40 L -8,40 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="4"/>

    <!-- Windows -->
    <circle cx="0" cy="-40" r="8" fill="#1e90ff" opacity="0.3"/>
    <circle cx="0" cy="-20" r="8" fill="#1e90ff" opacity="0.3"/>
    <circle cx="0" cy="0" r="8" fill="#1e90ff" opacity="0.3"/>
    <circle cx="0" cy="20" r="8" fill="#1e90ff" opacity="0.3"/>
  </g>

  <!-- Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Sky Learning
  </text>
</svg>
